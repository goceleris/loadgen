name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test -race -count=1 -timeout 120s ./...

  integration:
    name: Integration (live celeris)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # The testserver helper imports github.com/goceleris/celeris (pinned in
      # go.mod). Integration tests spawn it as a subprocess per matrix cell,
      # then drive loadgen against the live server via the library API. -race
      # catches concurrency regressions in the upgrade + mix dispatch paths.
      - name: Run integration matrix
        run: go test -tags integration -race -count=1 -timeout 180s -v -run TestIntegrationH2CMatrix .
